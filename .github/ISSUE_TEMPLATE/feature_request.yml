name: Feature request
description: Suggest a new feature or improvement
title: '[Feature]: '
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or workflow gap, not only the solution.
      placeholder: I often need to…
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you would like Ferro to do.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or existing workarounds.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links to how other clients (FileZilla, WinSCP, Cyberduck) handle it.
