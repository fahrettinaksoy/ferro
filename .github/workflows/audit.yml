name: Audit

# "audit" zorunlu check'ini üretir: bağımlılık güvenlik denetimi (npm + cargo).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

      # Rust bağımlılık denetimi bilgilendirmedir; yeni bir advisory (ya da kurulum
      # sorunu) merge'i bloklamasın — "audit" kapısı npm audit sonucuyla belirlenir.
      - name: cargo audit (Rust deps, best-effort)
        continue-on-error: true
        run: |
          cargo install cargo-audit --locked
          cd src-tauri && cargo audit
