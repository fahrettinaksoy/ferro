# Otomatik bağımlılık güncellemeleri — üç ekosistem de kapsanır.
# Major'lar kırıcı olabildiği için otomatik PR AÇILMAZ (bilinçli, elle yükseltilir);
# minor/patch'ler tek grup PR'ında toplanır (gürültü azalır). CI kalite + audit
# kapıları her PR'ı ayrıca doğrular.
version: 2
updates:
  # Frontend (package.json)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Rust arka uç (src-tauri/Cargo.toml)
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions sürümleri (checkout, setup-node, tauri-action…)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        update-types:
          - minor
          - patch
