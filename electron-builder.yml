appId: com.ferro.app
productName: Ferro
copyright: Copyright © 2026 Fahrettin Aksoy
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!test/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!vitest.config.{js,ts}'
  - '!{eslint.config.mjs,commitlint.config.mjs,.prettierrc.yaml,dev-app-update.yml}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.nvmrc,.husky,.github,docs,scripts,seed}'
  - '!{*.md,stackvo.json,Dockerfile,.dockerignore}'
asar: true
asarUnpack:
  - resources/**
# İlk açılış tohum verisi: process.resourcesPath/seed/sites.seed.json altında erişilir.
extraResources:
  - from: seed/sites.seed.json
    to: seed/sites.seed.json
artifactName: ${productName}-${version}-${arch}.${ext}

mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64, x64]
  # Kod imzalama: CSC_LINK + CSC_KEY_PASSWORD env değişkenleriyle.
  # Notarization: APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
  # İmzalama: WIN_CSC_LINK + WIN_CSC_KEY_PASSWORD env değişkenleriyle.
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
  category: Network
  maintainer: Fahrettin Aksoy <backend@cyh.com.tr>

# Auto-update + release hedefi: GitHub Releases (release.yml workflow'u yayınlar).
publish:
  provider: github
  owner: fahrettinaksoy
  repo: ferro

npmRebuild: false
